repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        types: [python]
        args: [--ignore-missing-imports]
        exclude: ^(experimental|tools|data_tools|tests|configs|scripts)/
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        args: [--exclude, "experimental/|tools/|data_tools/|tests/|configs/|scripts/"]
        additional_dependencies: [torch>=2.0, numpy>=1.20]
