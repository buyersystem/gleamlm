repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        args: [--exclude, "gleamlm-nano/|gleamlm-lite/|gleamlm-pro/|scripts/|data_tools/|tests/|configs/"]
        additional_dependencies: [torch>=2.0, numpy>=1.20]
